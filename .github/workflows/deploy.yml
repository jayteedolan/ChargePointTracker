name: Deploy to Pi

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: [self-hosted, linux, arm64]
    timeout-minutes: 10

    steps:
      - name: Pull latest code
        run: |
          cd /home/jtdolan/Projects/ChargePointTracker
          git fetch origin main
          git reset --hard origin/main

      - name: Install dependencies
        run: |
          /home/jtdolan/Projects/ChargePointTracker/venv/bin/pip install -r             /home/jtdolan/Projects/ChargePointTracker/requirements.txt

      - name: Restart service
        run: sudo systemctl restart chargepoint_monitor

      - name: Verify service is running
        run: |
          sleep 3
          systemctl is-active --quiet chargepoint_monitor             && echo 'Service is active'             || (journalctl -u chargepoint_monitor -n 30 --no-pager; exit 1)
